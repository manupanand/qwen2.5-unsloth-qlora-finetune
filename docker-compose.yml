version: "3.9"

# ─────────────────────────────────────────────────────────────────────
# UI + Server docker-compose
#
# Dev  →  docker compose --profile dev up
#         UI hot-reload at http://localhost:3000/agent/view/finetune-llm
#
# Prod →  docker compose --profile prod up
#         Rust binary serves built UI at http://localhost:8000/agent/view/finetune-llm
#
# NOTE: Run infra-docker-compose.yml first to start Redis/Qdrant/MinIO
# ─────────────────────────────────────────────────────────────────────

networks:
  shared-net:
    external: true

services:
  # ── Dev: Vite HMR only ────────────────────────────────────────────
  dev:
    image: node:20-alpine
    container_name: finetune-ui-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./UI:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    networks:
      - shared-net
    profiles: ["dev"]

  # ── Prod: Rust binary serves built UI ────────────────────────────
  prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: final
    container_name: llm-finetune-server
    ports:
      - "8000:8000"
    env_file:
      - server.env
    environment:
      PORT: "8000"
      DIST_DIR: "./dist"
      RUST_LOG: "info,lora_studio_server=debug"
    networks:
      - shared-net
    restart: unless-stopped
    profiles: ["prod"]
